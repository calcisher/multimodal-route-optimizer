<!DOCTYPE html>
<html lang="tr" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<title>Multi Route — Çok Modlu Seyahat</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<link rel="stylesheet" href="css/main.css"/>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="env,react" src="js/i18n.js"></script>
<script type="text/babel" data-presets="env,react" src="js/constants.js"></script>
<script type="text/babel" data-presets="env,react" src="js/utils.js"></script>
<script type="text/babel" data-presets="env,react" src="js/components/Filter.jsx"></script>
<script type="text/babel" data-presets="env,react">

const { useState, useEffect, useRef, useCallback } = React;


// `hubIata` + `hubWait` are optional. When present, the marker for that IATA
// gets a permanent badge below the city tooltip showing layover time/colour.
function InlineMap({ route, onClose, lang, hubIata, hubWait }) {
  const t = T[lang];
  const containerRef = useRef(null);
  const mapRef = useRef(null);

  useEffect(() => {
    if (!containerRef.current || typeof L === 'undefined') return;

    const theme = document.documentElement.getAttribute('data-theme') || 'light';
    const tileUrl = theme === 'dark' ?
      'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png' :
      'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';

    const map = L.map(containerRef.current, {
      zoomControl: true,
      scrollWheelZoom: false,
      attributionControl: true
    });

    L.tileLayer(tileUrl, {
      maxZoom: 18,
      subdomains: 'abcd',
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>'
    }).addTo(map);

    const ICON = { flight: '✈', bus: '🚌', train: '🚆' };
    const LABEL = (type) => type === 'flight' ? t.flightLeg : type === 'bus' ? t.busLeg : t.trainLeg;

    const bounds = [];
    const used = new Set();

    route.segments.forEach((seg) => {
      const a = LATLNG[seg.from], b = LATLNG[seg.to];
      if (!a || !b) return;
      used.add(seg.from); used.add(seg.to);
      const color = LINE_COLOR[seg.type] || '#999';
      const pts = seg.type === 'flight' ? arcLatLng(a, b) : [a, b];
      const line = L.polyline(pts, {
        color, weight: 4, opacity: .92,
        dashArray: seg.type === 'bus' ? '10,8' : null
      }).addTo(map);

      const pill = seg.duration ? `${ICON[seg.type]} ${seg.duration}` : `${ICON[seg.type]} ${LABEL(seg.type)}`;
      line.bindTooltip(pill, {
        permanent: true,
        interactive: true,
        direction: 'top',
        offset: [0, -4],
        className: `map-seg-label ${seg.type}`
      });

      const fromCity = CITY_NAMES[seg.from] || seg.from;
      const toCity = CITY_NAMES[seg.to] || seg.to;
      const popupHtml =
        `<div class="map-popup-body">` +
        `<div class="map-popup-head" style="color:${color}">${ICON[seg.type]} <span>${LABEL(seg.type).toUpperCase()}</span></div>` +
        (seg.carrier ? `<div class="map-popup-carrier">${seg.carrier}</div>` : '') +
        `<div class="map-popup-route">${fromCity} → ${toCity}</div>` +
        (seg.duration ? `<div class="map-popup-dur">⏱ ${seg.duration}</div>` : '') +
        `</div>`;
      line.bindPopup(popupHtml, { closeButton: true, autoPan: true, maxWidth: 280 });

      pts.forEach((p) => bounds.push(p));
    });

    used.forEach((iata) => {
      const c = LATLNG[iata];
      if (!c) return;
      const isOrigin = route.segments[0].from === iata;
      const color = isOrigin ? '#F4611E' : '#2563EB';
      const cityName = CITY_NAMES[iata] || iata;
      // The visible pin + permanent city tooltip stays minimal so it never
      // collides with neighbouring segment labels.
      L.circleMarker(c, {
        radius: 7, fillColor: '#fff', color, weight: 3, fillOpacity: 1
      }).addTo(map).bindTooltip(cityName, {
        permanent: true,
        direction: 'top',
        offset: [0, -8],
        className: 'map-city-label' + (isOrigin ? ' origin' : '')
      });
      // Hub-only: stack a second, invisible hit-area marker on the same point
      // and bind a NON-permanent tooltip with the layover badge. Leaflet only
      // allows one tooltip per layer, so this two-marker trick is what lets us
      // keep the city name always visible while showing the wait badge only
      // on hover (avoids the overlap users were hitting in dense maps).
      const isHub = hubIata && hubWait && hubWait.minutes != null && iata === hubIata;
      if (isHub) {
        const css = `color:${hubWait.color || '#5C4A3D'};border-color:${hubWait.color || '#E8DDD8'};background:${hubWait.bg || 'rgba(255,255,255,.95)'}`;
        const html = `<span class="map-hub-wait" style="${css}">⏱ ${fmtConnMinutes(hubWait.minutes)} ${hubWait.label || ''}</span>`;
        L.marker(c, {
          icon: L.divIcon({
            className: 'map-hub-hit',
            html: '',
            iconSize: [28, 28],
            iconAnchor: [14, 14]
          }),
          interactive: true,
          keyboard: false
        }).addTo(map).bindTooltip(html, {
          direction: 'bottom',
          offset: [0, 14],
          className: 'map-hub-wait-tip',
          sticky: false,
          opacity: 1
        });
      }
      bounds.push(c);
    });

    if (bounds.length) map.fitBounds(bounds, { padding: [60, 60] });
    setTimeout(() => map.invalidateSize(), 300);

    mapRef.current = map;
    return () => {
      if (mapRef.current) { mapRef.current.remove(); mapRef.current = null; }
    };
  }, [route, lang]);

  return (
    <div className="inline-map">
      <div className="inline-map-inner" style={{ position: 'relative' }}>
        <button className="inline-map-close" onClick={(e) => { e.stopPropagation(); onClose(); }}>✕</button>
        <div ref={containerRef} className="leaflet-host" onClick={(e) => e.stopPropagation()} />
      </div>
      <div className="map-legend">
        <div className="legend-item"><div className="legend-line" style={{ background: '#2563EB' }} />{t.flightLeg}</div>
        <div className="legend-item"><div className="legend-line" style={{ background: '#F4611E', backgroundImage: 'repeating-linear-gradient(90deg,#F4611E 0,#F4611E 8px,transparent 8px,transparent 13px)' }} />{t.busLeg}</div>
        <div className="legend-item"><div className="legend-line" style={{ background: '#16A34A' }} />{t.trainLeg}</div>
        <div style={{ marginLeft: 'auto', fontSize: 10, color: 'var(--lt)' }}>🔴 {lang === 'tr' ? 'Kalkış' : 'Orig.'} · 🔵 {lang === 'tr' ? 'Varış' : 'Dest.'}</div>
      </div>
    </div>);

}

// ── Journey Diagram ───────────────────────────────────────────────────────────
const SEG_COLOR = { flight: '#2563EB', bus: '#F4611E', train: '#16A34A' };

function JourneyDiagram({ nodes, segs, lang }) {
  const t = T[lang] || T.tr;
  return (
    <div className="jd-wrap">
      {nodes.map((node, i) => {
        const isOrigin = i === 0;
        const isDest = i === nodes.length - 1;
        return (
          <React.Fragment key={i}>
            <div className="jd-node">
              <div className="jd-dot-ring" style={{ background: isOrigin ? '#FEE4D8' : isDest ? '#DBEAFE' : '#F3F4F6' }}>
                <div className="jd-dot" style={{ background: isOrigin ? '#F4611E' : '#2563EB' }} />
              </div>
              <div className="jd-city">{node.name || CITY_NAMES[node.iata] || node.iata}</div>
              <div className="jd-iata">{node.iata}</div>
              {(node.arr || node.dep) &&
              <div className="jd-node-times">
                  {node.arr &&
                <span className="jd-tm-arr">
                      {node.arr}
                      {node.arrNextDay && <span className="jd-tm-nd">+1</span>}
                    </span>
                }
                  {node.arr && node.dep && <span className="jd-tm-sep">→</span>}
                  {node.dep && <span className="jd-tm-dep">{node.dep}</span>}
                </div>
              }
              {node.layover &&
              <div className="jd-node-layover">⏱ {node.layover} {t.layover}</div>
              }
            </div>
            {i < segs.length &&
            <div className="jd-conn">
                <div className="jd-bar">
                  <div className="jd-line-thick" style={{
                  background: SEG_COLOR[segs[i].type],
                  backgroundImage: segs[i].type === 'bus' ? `repeating-linear-gradient(90deg,${SEG_COLOR.bus} 0,${SEG_COLOR.bus} 10px,transparent 10px,transparent 16px)` : 'none'
                }} />
                  <div className="jd-arrowhead" style={{ borderLeft: `10px solid ${SEG_COLOR[segs[i].type]}` }} />
                </div>
                <div className="jd-seg-carrier">
                  {segs[i].carrier || (segs[i].type === 'flight' ? t.flightLeg : segs[i].type === 'bus' ? t.busLeg : t.trainLeg)}
                  {segs[i].ref ? ` · ${segs[i].ref}` : ''}
                </div>
                <div className="jd-dur">{segs[i].duration}</div>
              </div>
            }
          </React.Fragment>);

      })}
    </div>);

}

// ── Detail List (segment cards) ───────────────────────────────────────────────
const MODE_TINT = { flight: 'var(--blue-s)', bus: 'var(--or-s)', train: 'var(--green-s)' };


function DetailGrid({ segs, currency, lang, flightPackage }) {
  const fmt = (n) => currency === 'USD' ? `$${n}` : `€${n}`;
  const t = T[lang] || T.tr;
  const skyCopy = lang === 'tr' ? "Skyscanner'da Ara" : 'Search on Skyscanner';
  const omioCopy = lang === 'tr' ? "Omio'da Ara" : 'Search on Omio';
  return (
    <div className="dg2-wrap">
      {segs.map((seg, i) => {
        const isFlight = seg.type === 'flight';
        const prev = i > 0 ? segs[i - 1] : null;
        const next = i < segs.length - 1 ? segs[i + 1] : null;
        const isFlightGroupStart = isFlight && (i === 0 || prev.type !== 'flight');
        const isFlightGroupEnd = isFlight && (i === segs.length - 1 || next.type !== 'flight');
        const color = SEG_COLOR[seg.type];
        const modeLabel = (isFlight ? t.flightLeg : seg.type === 'bus' ? t.busLeg : t.trainLeg).toUpperCase();
        const icon = isFlight ? '✈' : seg.type === 'bus' ? '🚌' : '🚆';
        const fromName = seg.fromName && seg.fromName !== seg.from ? seg.fromName : null;
        const toName = seg.toName && seg.toName !== seg.to ? seg.toName : null;
        const isFollowUpFlightInPkg = isFlight && flightPackage && flightPackage.legCount > 1 && !isFlightGroupStart;
        const showLayover = i > 0;
        return (
          <React.Fragment key={i}>
            {showLayover && (() => {
              const dur = calcLayover(prev, seg);
              const iata = prev.to && prev.to.length === 3 && prev.to === prev.to.toUpperCase() ? prev.to : null;
              const cityName = prev.toName || (iata && CITY_NAMES[iata]) || prev.to;
              const where = iata && cityName && cityName !== iata ? `${cityName} (${iata})` : cityName || iata;
              return (
                <div className="dg2-layover">
                  <span className="dg2-layover-pill">
                    ⏱ {dur ? `${dur} ${t.layover}` : t.layover}{where ? ` · ${where}` : ''}
                  </span>
                </div>);
            })()}

            {isFlightGroupStart && flightPackage && flightPackage.legCount > 1 &&
              <div className="dg2-pkg" style={{ borderColor: SEG_COLOR.flight, background: MODE_TINT.flight }}>
                <div className="dg2-pkg-left">
                  <div className="dg2-pkg-tag" style={{ color: SEG_COLOR.flight }}>
                    <span className="dg2-pkg-icon">✈</span>{t.flightPackage.toUpperCase()}
                  </div>
                  <div className="dg2-pkg-meta">{flightPackage.airline} · {flightPackage.legCount} {t.flightPackageLegs}</div>
                </div>
                <div className="dg2-pkg-right">
                  <div className="dg2-pkg-price" style={{ color: SEG_COLOR.flight }}>{fmt(flightPackage.price)}</div>
                  <div className="dg2-pkg-sub">{t.flightPackageTotal}</div>
                </div>
              </div>
            }

            <div className={`dg3-leg ${seg.type}`} style={{ borderLeftColor: color }}>
              <div className="dg3-leg-id">
                <div className="dg3-leg-tag" style={{ color }}>
                  <span className="dg3-leg-tag-icon">{icon}</span>
                  <span>{modeLabel}</span>
                </div>
                <div className="dg3-leg-carrier">{seg.carrier}</div>
                {seg.ref && <div className="dg3-leg-ref">{seg.ref}</div>}
              </div>

              <div className="dg3-leg-timeline">
                <div className="dg3-leg-end">
                  <div className="dg3-leg-time">{seg.dep}</div>
                  <div className="dg3-leg-place">
                    <span className="dg3-leg-iata">{seg.from}</span>{fromName || ''}
                  </div>
                </div>
                <div className="dg3-leg-track">
                  <div className="dg3-track-dur">{seg.duration}</div>
                  <div className="dg3-track-bar">
                    <div className="dg3-track-line" />
                    <span className="dg3-track-icon" style={{ color }}>{icon}</span>
                    <div className="dg3-track-line" />
                  </div>
                </div>
                <div className="dg3-leg-end right">
                  <div className="dg3-leg-time">
                    {seg.arr}{seg.nextDay && <span className="dg2-nextday">+1</span>}
                  </div>
                  <div className="dg3-leg-place">
                    <span className="dg3-leg-iata">{seg.to}</span>{toName || ''}
                  </div>
                </div>
              </div>

              <div className="dg3-leg-price" style={{ color: seg.price != null ? color : 'var(--lt)' }}>
                {isFollowUpFlightInPkg ?
                  <span className="dg3-leg-price-incl">{t.includedInFlight}</span> :
                  seg.price == null ?
                    <span>—</span> :
                    <span>{fmt(seg.price)}</span>
                }
              </div>
            </div>

            {isFlightGroupEnd && seg.buyUrl &&
              <div className="dg3-cta-row">
                <a href={seg.buyUrl} target="_blank" rel="noopener noreferrer"
                  className="dg3-sky-btn"
                  onClick={(e) => e.stopPropagation()}>
                  ✈ {skyCopy} <span className="dg3-sky-btn-arrow">↗</span>
                </a>
              </div>
            }

            {!isFlight && seg.buyUrl &&
              <div className="dg3-cta-row">
                <a href={seg.buyUrl} target="_blank" rel="noopener noreferrer"
                  className="dg3-buy-btn"
                  style={{ borderColor: color, color }}
                  onClick={(e) => e.stopPropagation()}>
                  {icon} {omioCopy} <span className="dg3-sky-btn-arrow">↗</span>
                </a>
              </div>
            }
          </React.Fragment>);

      })}
    </div>);

}

// ── Card Detail Shell ─────────────────────────────────────────────────────────
function CardDetailShell({ header, mapRoute, lang, journey, detailSegs, total, currency, flightPackage }) {
  const [open, setOpen] = useState(false);
  const [showMap, setShowMap] = useState(false);
  const fmt = (n) => currency === 'USD' ? `$${n}` : `€${n}`;
  return (
    <div className="card" style={{ cursor: 'pointer' }} onClick={() => {setOpen((p) => !p);setShowMap(false);}}>
      <div className="card-main" style={{ display: 'flex', alignItems: 'center' }}>
        {header}
        <span className={`card-chevron${open ? ' open' : ''}`}>▾</span>
      </div>
      {open &&
      <div className="detail-panel" onClick={(e) => e.stopPropagation()}>
          {journey && <JourneyDiagram nodes={journey.nodes} segs={journey.segs} lang={lang} />}
          {detailSegs && <DetailGrid segs={detailSegs} currency={currency} lang={lang} flightPackage={flightPackage} />}
          {total &&
        <div className="dp-total-row">
              <span className="dp-total-label">{lang === 'tr' ? 'Toplam fiyat' : 'Total price'}</span>
              <span className="dp-total-price">{fmt(total)}</span>
            </div>
        }
          <div className="dp-actions">
            <button className={`dp-map-btn${showMap ? ' active' : ''}`} onClick={() => setShowMap((p) => !p)}>
              🗺 {showMap ? lang === 'tr' ? 'Haritayı Gizle' : 'Hide Map' : lang === 'tr' ? 'Haritada Gör' : 'Show on Map'}
            </button>
          </div>
          {showMap && <InlineMap route={mapRoute} onClose={() => setShowMap(false)} lang={lang} />}
        </div>
      }
    </div>);

}

function FlightOperationalDetailShell({ header, mapRoute, lang, detailSegs, totalPrice, totalDuration, stops, currency, buyUrl }) {
  const [open, setOpen] = useState(false);
  const [showMap, setShowMap] = useState(false);
  const t = T[lang || 'tr'];
  const fmt = (n) => currency === 'USD' ? `$${n}` : `€${n}`;
  const segs = Array.isArray(detailSegs) ? detailSegs : [];
  const first = segs[0] || {};
  const last = segs[segs.length - 1] || {};
  const refs = segs.map((seg) => seg.ref).filter(Boolean);
  const airline = first.carrier || '';
  const legCount = Math.max(segs.length, 1);
  const skyCopy = lang === 'tr' ? "Skyscanner'da Ara" : 'Search on Skyscanner';
  const personCopy = lang === 'tr' ? '/ kişi' : '/ person';
  const totalCopy = lang === 'tr' ? 'Toplam süre' : 'Total time';
  const stopCopy = stops === 0 ? t.nonstop : `${stops} ${t.transfer}`;

  return (
    <div className="card" style={{ cursor: 'pointer' }} onClick={() => {setOpen((p) => !p);setShowMap(false);}}>
      <div className="card-main" style={{ display: 'flex', alignItems: 'center' }}>
        {header}
        <span className={`card-chevron${open ? ' open' : ''}`}>▾</span>
      </div>
      {open &&
        <div className="flight-op-panel" onClick={(e) => e.stopPropagation()}>
          <div className="flight-op-grid">
            <aside className="flight-op-side">
              <div className="flight-op-side-art" aria-hidden="true">
                <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M8 56h48" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"/>
                  <path d="M14 56V40h12v16" stroke="currentColor" strokeWidth="2.5" strokeLinejoin="round"/>
                  <rect x="32" y="20" width="10" height="36" stroke="currentColor" strokeWidth="2.5" strokeLinejoin="round"/>
                  <path d="M37 20V10" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"/>
                  <circle cx="37" cy="8" r="2" fill="currentColor"/>
                  <path d="M32 30h10M32 38h10M32 46h10" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"/>
                  <path d="M48 56V34l8-4v26" stroke="currentColor" strokeWidth="2.5" strokeLinejoin="round"/>
                </svg>
              </div>
              <div className="flight-op-kicker">✈ {t.flightPackage}</div>
              <div className="flight-op-airline">{airline}</div>
              {refs.length > 0 && <div className="flight-op-refs">{refs.join(' · ')}</div>}
              <div className="flight-op-pills">
                <span className="flight-op-pill"><b>{legCount}</b> {lang === 'tr' ? 'bacak' : (legCount === 1 ? 'leg' : 'legs')}</span>
                <span className="flight-op-pill"><b>{stops}</b> {(t.transfer || '').toLowerCase()}</span>
              </div>
            </aside>

            <main className="flight-op-main">
              <div className="flight-op-route">
                <div className="flight-op-route-end">
                  <div className="flight-op-route-time">{first.dep}</div>
                  <div className="flight-op-route-place"><b>{first.from}</b>{first.fromName || CITY_NAMES[first.from] || ''}</div>
                </div>
                <div className="flight-op-route-rail">
                  <div className="flight-op-rail-line" />
                  <span className="flight-op-rail-chip">✈ {totalDuration}</span>
                  <div className="flight-op-rail-line" />
                </div>
                <div className="flight-op-route-end right">
                  <div className="flight-op-route-time">{last.arr}{last.nextDay && <span className="dg2-nextday">+1</span>}</div>
                  <div className="flight-op-route-place"><b>{last.to}</b>{last.toName || CITY_NAMES[last.to] || ''}</div>
                </div>
              </div>

              <div className="flight-op-table">
                <div className="flight-op-head">
                  <div>{lang === 'tr' ? 'Operatör' : 'Operator'}</div>
                  <div>{lang === 'tr' ? 'Uçuş rotası' : 'Flight route'}</div>
                </div>
                {segs.map((seg, i) => {
                  const prev = i > 0 ? segs[i - 1] : null;
                  const layover = prev ? calcLayover(prev, seg) : null;
                  const where = prev ? (prev.toName || CITY_NAMES[prev.to] || prev.to) : '';
                  return (
                    <React.Fragment key={`${seg.ref || i}-${seg.from}-${seg.to}`}>
                      {i > 0 &&
                        <div className="flight-op-layover">
                          ⏱ {layover ? `${layover} ${t.layover}` : t.layover}
                          {where ? ` · ${where} (${prev.to})` : ''}
                        </div>
                      }
                      <div className="flight-op-row">
                        <div className="flight-op-carrier">
                          <div className="flight-op-carrier-name">{seg.carrier}</div>
                          {seg.ref && <div className="flight-op-carrier-ref">{seg.ref}</div>}
                        </div>
                        <div className="flight-op-leg-route">
                          <div>
                            <div className="flight-op-leg-time">{seg.dep}</div>
                            <div className="flight-op-leg-place"><b>{seg.from}</b>{seg.fromName || CITY_NAMES[seg.from] || ''}</div>
                          </div>
                          <div className="flight-op-leg-mid">
                            <div className="flight-op-leg-duration">{seg.duration}</div>
                            <div className="flight-op-leg-line"><span className="flight-op-leg-icon">✈</span></div>
                          </div>
                          <div style={{ textAlign: 'right' }}>
                            <div className="flight-op-leg-time">{seg.arr}{seg.nextDay && <span className="dg2-nextday">+1</span>}</div>
                            <div className="flight-op-leg-place"><b>{seg.to}</b>{seg.toName || CITY_NAMES[seg.to] || ''}</div>
                          </div>
                        </div>
                      </div>
                    </React.Fragment>
                  );
                })}
              </div>
            </main>

            <aside className="flight-op-action">
              <div>
                <div className="flight-op-price">{fmt(totalPrice)}</div>
                <div className="flight-op-price-sub">{personCopy}<br />{totalCopy} · {stopCopy}</div>
              </div>
              <div className="flight-op-action-stack">
                <a href={buyUrl || 'https://www.skyscanner.com.tr/'} target="_blank" rel="noopener noreferrer"
                  className="flight-op-primary" onClick={(e) => e.stopPropagation()}>
                  ✈ {skyCopy} ↗
                </a>
                <button className={`flight-op-secondary${showMap ? ' active' : ''}`} onClick={() => setShowMap((p) => !p)}>
                  🗺 {showMap ? t.mapHideBtn : t.mapShowBtn}
                </button>
              </div>
            </aside>
          </div>
          {showMap && <InlineMap route={mapRoute} onClose={() => setShowMap(false)} lang={lang} />}
        </div>
      }
    </div>
  );
}

// ── Combo card ────────────────────────────────────────────────────────────────
function ComboCard({ d, currency, mode, lang }) {
  const t = T[lang];
  const fmt = (n) => currency === "USD" ? `$${n}` : `€${n}`;
  const isBus = d.ground.type === 'Bus';
  const gColor = isBus ? 'var(--or)' : 'var(--green)';
  const gBg = isBus ? 'var(--or-s)' : 'var(--green-s)';
  const gType = d.ground.type.toLowerCase();
  const flightAirline = d.flight.airline || '';

  // Normalize flight legs so a direct flight and a multi-stop one share the
  // same rendering path. Each leg is { dep, arr, from, to, fromName, toName,
  // duration, flightNo, airline }.
  const hasMultiLeg = Array.isArray(d.flight.legs) && d.flight.legs.length > 0;
  const fallbackFlightFrom = d.flight.fromIata || (mode === 'flightFirst' ? d.depIata : d.via);
  const fallbackFlightTo = d.flight.toIata || (mode === 'flightFirst' ? d.via : d.arrIata);
  const flightLegs = hasMultiLeg ? d.flight.legs : [{
    dep: d.flight.dep, arr: d.flight.arr,
    from: fallbackFlightFrom, to: fallbackFlightTo,
    fromName: '', toName: '',
    duration: d.flight.duration,
    flightNo: d.flight.flightNo,
    airline: flightAirline,
  }];
  const flightLayovers = Array.isArray(d.flight.layovers) ? d.flight.layovers : [];
  const stopsCount = (typeof d.flight.stops === 'number' ? d.flight.stops : flightLegs.length - 1);
  const flightFirstDep = flightLegs[0].dep;
  const flightLastArr = flightLegs[flightLegs.length - 1].arr;

  // Map segments — every flight leg is its own arc, plus the ground leg.
  const flightMapSegs = flightLegs.map((l) => ({
    from: l.from, to: l.to, type: 'flight',
    carrier: l.airline || flightAirline, duration: l.duration }));

  const groundMapSeg = mode === 'flightFirst' ?
  { from: d.via, to: d.arrIata, type: gType, carrier: d.ground.company, duration: d.ground.duration } :
  { from: d.depIata, to: d.via, type: gType, carrier: d.ground.company, duration: d.ground.duration };
  const mapSegs = mode === 'flightFirst' ? [...flightMapSegs, groundMapSeg] : [groundMapSeg, ...flightMapSegs];

  // Layover nodes for stops between consecutive flight legs.
  const flightLayoverNodes = flightLegs.slice(1).map((l, i) => {
    const lay = flightLayovers[i] || {};
    return {
      iata: l.from,
      name: lay.city || CITY_NAMES[l.from] || l.from,
      arr: flightLegs[i].arr,
      dep: l.dep,
      layover: lay.duration || calcLayover({ arr: flightLegs[i].arr }, { dep: l.dep })
    };
  });

  let nodes;
  if (mode === 'flightFirst') {
    const viaLayover = calcLayover({ arr: flightLastArr }, { dep: d.ground.dep });
    nodes = [
    { iata: d.depIata, dep: flightFirstDep },
    ...flightLayoverNodes,
    { iata: d.via, name: CITY_NAMES[d.via], arr: flightLastArr, dep: d.ground.dep, layover: viaLayover },
    { iata: d.arrIata, arr: d.ground.arr, arrNextDay: !!d.ground.nextDay }];

  } else {
    const viaLayover = calcLayover({ arr: d.ground.arr }, { dep: flightFirstDep });
    nodes = [
    { iata: d.depIata, dep: d.ground.dep },
    { iata: d.via, name: CITY_NAMES[d.via], arr: d.ground.arr, dep: flightFirstDep, layover: viaLayover },
    ...flightLayoverNodes,
    { iata: d.arrIata, arr: flightLastArr }];

  }

  const flightJourneySegs = flightLegs.map((l) => ({
    type: 'flight', duration: l.duration,
    carrier: l.airline || flightAirline, ref: l.flightNo }));

  const groundJourneySeg = { type: gType, duration: d.ground.duration, carrier: d.ground.company };
  const journey = {
    nodes,
    segs: mode === 'flightFirst' ? [...flightJourneySegs, groundJourneySeg] : [groundJourneySeg, ...flightJourneySegs]
  };

  // Detail panel — one card per real leg (flight legs split out individually).
  const flightFirstFromIata = flightLegs[0].from;
  const flightLastToIata = flightLegs[flightLegs.length - 1].to;
  const flightDetailSegs = flightLegs.map((l, i) => ({
    type: 'flight',
    from: l.from, to: l.to,
    fromName: l.fromName || CITY_NAMES[l.from] || l.from,
    toName: l.toName || CITY_NAMES[l.to] || l.to,
    carrier: l.airline || flightAirline,
    ref: l.flightNo,
    dep: l.dep, arr: l.arr,
    duration: l.duration,
    price: i === 0 ? d.flight.price : null,
    buyUrl: `https://www.google.com/travel/flights?q=${flightFirstFromIata}+to+${flightLastToIata}`
  }));
  const groundDetailSeg = {
    type: gType, from: d.ground.from, to: d.ground.to,
    fromName: d.ground.from, toName: d.ground.to,
    carrier: d.ground.company, ref: '',
    dep: d.ground.dep, arr: d.ground.arr, nextDay: d.ground.nextDay,
    duration: d.ground.duration, price: d.ground.price,
    buyUrl: 'https://www.omio.com'
  };
  const detailSegs = mode === 'flightFirst' ? [...flightDetailSegs, groundDetailSeg] : [groundDetailSeg, ...flightDetailSegs];

  const flightPackage = flightLegs.length > 1 ? {
    price: d.flight.price,
    legCount: flightLegs.length,
    airline: flightAirline
  } : null;

  const stopsSuffix = stopsCount > 0 ? ` · ${stopsCount} ${t.transfer}` : '';
  const seg1 = mode === 'flightFirst' ?
  { icon: '✈', color: 'var(--blue)', bg: 'var(--blue-s)', label: t.flightLeg, main: flightAirline, sub: `${flightFirstDep}→${flightLastArr} · ${d.flight.toCity ?? ''}${stopsSuffix}` } :
  { icon: isBus ? '🚌' : '🚆', color: gColor, bg: gBg, label: isBus ? t.busLeg : t.trainLeg, main: d.ground.company, sub: `${d.ground.dep}→${d.ground.arr} · ${d.ground.from}` };
  const seg2 = mode === 'flightFirst' ?
  { icon: isBus ? '🚌' : '🚆', color: gColor, bg: gBg, label: isBus ? t.busLeg : t.trainLeg, main: d.ground.company, sub: `${d.ground.dep}→${d.ground.arr}${d.ground.nextDay ? ' (+1)' : ''}` } :
  { icon: '✈', color: 'var(--blue)', bg: 'var(--blue-s)', label: t.flightLeg, main: flightAirline, sub: `${flightFirstDep}→${flightLastArr} · ${d.flight.fromIata ?? d.via}${stopsSuffix}` };

  const header =
  <>
      <div className="combo-seg" style={{ flex: 1 }}>
        <div className="combo-mode" style={{ background: seg1.bg, color: seg1.color }}>{seg1.icon}</div>
        <div className="combo-seg-info"><div className="combo-seg-label">{seg1.label}</div><div className="combo-seg-main">{seg1.main}</div><div className="combo-seg-sub">{seg1.sub}</div></div>
      </div>
      <div className="combo-arrow">→</div>
      <div className="combo-seg" style={{ flex: 1 }}>
        <div className="combo-mode" style={{ background: seg2.bg, color: seg2.color }}>{seg2.icon}</div>
        <div className="combo-seg-info"><div className="combo-seg-label">{seg2.label}</div><div className="combo-seg-main">{seg2.main}</div><div className="combo-seg-sub">{seg2.sub}</div></div>
      </div>
      <div className="combo-total"><div className="combo-total-price">{fmt(d.total)}</div><div className="combo-total-sub">{t.total}</div></div>
    </>;

  return <CardDetailShell header={header} mapRoute={{ segments: mapSegs }} lang={lang} journey={journey} detailSegs={detailSegs} total={d.total} currency={currency} flightPackage={flightPackage} />;
}

// ── Ground card ───────────────────────────────────────────────────────────────
function GroundCard({ d, currency, lang }) {

  const fmt = (n) => currency === "USD" ? `$${n}` : `€${n}`;
  const route = { segments: [{ from: 'VCE', to: 'NUE', type: d.type.toLowerCase(), carrier: d.company, duration: d.duration }] };
  const journey = { nodes: [{ iata: 'VCE', dep: d.dep }, { iata: 'NUE', arr: d.arr }], segs: [{ type: d.type.toLowerCase(), duration: d.duration, carrier: d.company }] };

// ── CityInput ─────────────────────────────────────────────────────────────────
// Normalize for fuzzy matching: lowercase + strip diacritics so "Nurnberg"
// matches "Nürnberg" and "Munchen" matches "München".

function CityInput({ label, value, onChange, onAirportSelect, selectedAirport, lang, airports }) {
  const [focused, setFocused] = useState(false);
  const [activeIdx, setActiveIdx] = useState(0);
  const t = T[lang];
  const suggestions = buildAirportSuggestions(airports, value, 8);
  const showDrop = focused && value.trim().length > 0;

  useEffect(() => { setActiveIdx(0); }, [value]);

  const pickAirport = (ap) => {
    onChange(ap.city);
    onAirportSelect(ap.iata);
    setFocused(false);
  };
  const pickCity = (s) => {
    onChange(s.city);
    onAirportSelect(null);
    setFocused(false);
  };
  const pickSuggestion = (s) => s.type === 'city' ? pickCity(s) : pickAirport(s.a);

  const onKeyDown = (e) => {
    if (!showDrop || suggestions.length === 0) return;
    if (e.key === 'ArrowDown') { e.preventDefault(); setActiveIdx((i) => (i + 1) % suggestions.length); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); setActiveIdx((i) => (i - 1 + suggestions.length) % suggestions.length); }
    else if (e.key === 'Enter') { e.preventDefault(); pickSuggestion(suggestions[activeIdx]); }
    else if (e.key === 'Escape') { setFocused(false); }
  };

  return (
    <div className="sf-field">
      <div className="sf-label">{label}</div>
      <div className="sf-input-wrap">
        <input className="sf-input"
          style={selectedAirport ? { paddingRight: 56 } : {}}
          value={value}
          onChange={(e) => { onChange(e.target.value); onAirportSelect(null); }}
          onFocus={() => setFocused(true)}
          onBlur={() => setTimeout(() => setFocused(false), 180)}
          onKeyDown={onKeyDown}
          autoComplete="off"
          placeholder={label === T[lang].from ? "Roma, Berlin, FCO..." : "Milano, München, MUC..."} />
        {selectedAirport && <span className="sf-ap-badge">{selectedAirport}</span>}
      </div>
      {showDrop &&
        <div className="ap-dropdown">
          {suggestions.length === 0 ?
            <div className="ap-empty">{t.noAirportMatch}</div> :
            suggestions.map((s, i) => {
              const active = i === activeIdx ? ' active' : '';
              if (s.type === 'city') {
                return (
                  <div key={`city-${_norm(s.city)}`}
                    className={`ap-item city${active}`}
                    onMouseDown={() => pickSuggestion(s)}
                    onMouseEnter={() => setActiveIdx(i)}>
                    <span className="ap-iata">★</span>
                    <div>
                      <div className="ap-name">{s.city} — {t.allAirports}</div>
                      <div className="ap-city">{s.airports.length} {t.airportsCount} · {s.country || ''}</div>
                    </div>
                  </div>);
              }
              return (
                <div key={`ap-${s.a.iata}-${s.child ? 'c' : 'r'}`}
                  className={`ap-item${s.child ? ' child' : ''}${active}`}
                  onMouseDown={() => pickSuggestion(s)}
                  onMouseEnter={() => setActiveIdx(i)}>
                  <span className="ap-iata">{s.a.iata}</span>
                  <div>
                    <div className="ap-name">{s.a.name}</div>
                    <div className="ap-city">{s.a.city}{s.a.country ? ` · ${s.a.country}` : ''}</div>
                  </div>
                </div>);
            })
          }
        </div>
      }
    </div>);
}


// ── HUB CARD HELPERS ─────────────────────────────────────────────────────────
// Connection thresholds (minutes). Pill is a visual signal: green ≥ 90, yellow 45–89, red < 45.
// AI picks (cheapest/fastest/earliest) require the project-wide 2h floor matching backend's
// min_total_price rule, so suggestions never include impractical sub-2h transfers.
const CONN_GREEN_MIN = 90;
const CONN_RED_MIN = 45;
const CONN_LONG_MIN = 480; // 8h: above this the layover is "too long" (gray pill).
const PICK_MIN_CONNECTION = 120;


// ── HUB ROW (one bus or flight option in the matrix) ─────────────────────────
// `waitInfo`: when this row is the second leg AND a first-leg pick exists, render
// a colored "Xs Ydk bekleme" line below the carrier meta to expose the layover.
function HubOptionRow({ kind, opt, selected, onSelect, badges, currency, lang, disabled, waitInfo }) {
  const t = T[lang];
  const fmt = (n) => currency === 'USD' ? `$${n}` : `€${n}`;
  const time = opt.dep && opt.arr ? `${opt.dep}→${opt.arr}` : (opt.dep || '—');
  const meta = kind === 'bus' ?
    `${opt.duration || ''} · ${opt.company || 'FlixBus'}` :
    `${opt.duration || ''} · ${opt.airline || ''}${opt.flightNo ? ' ' + opt.flightNo : ''}${(opt.stops ?? 0) > 0 ? ` · ${opt.stops} ${t.transfer}` : ''}`;
  const cls = `hub-row${selected ? ' selected' : ''}${disabled ? ' disabled' : ''}`;
  const handleClick = disabled ? undefined : onSelect;
  const title = disabled ? t.optionDisabledHint : undefined;
  return (
    <div className={cls} onClick={handleClick} title={title}>
      <div className="hub-row-radio" />
      <div className="hub-row-body">
        <div className="hub-row-line1">
          <span className="hub-row-time">{time}</span>
          {opt.nextDay && <span className="hub-row-tag next">+1</span>}
          {kind === 'flight' && opt.flightType === 'Best' && <span className="hub-row-tag best">{t.bestFlight.split(' ')[0]}</span>}
        </div>
        <div className="hub-row-line2">
          <span>{meta}</span>
          {badges?.cheap && <span className="hub-row-tag cheap">{t.cheapestBadge}</span>}
          {badges?.fast && <span className="hub-row-tag fast">{t.fastestBadge}</span>}
          {waitInfo && waitInfo.minutes != null && (
            <span className="hub-row-wait" style={{ color: waitInfo.color }}>
              <span className="hub-row-wait-dot" style={{ background: waitInfo.color }} />
              {fmtConnMinutes(waitInfo.minutes)} {t.waitWord}
            </span>
          )}
        </div>
      </div>
      <div className="hub-row-price">{opt.price != null ? fmt(opt.price) : '—'}</div>
    </div>);
}

// Sort options chronologically by departure (missing depISO sinks to bottom).

// ── HUB MASTER CARD ──────────────────────────────────────────────────────────
function HubMasterCard({ hubData, currency, lang, defaultExpanded = false, date }) {
  const t = T[lang];
  const fmt = (n) => currency === 'USD' ? `$${n}` : `€${n}`;
  const mode = hubData.mode;
  const { busOptions, flightOptions, hub } = hubData;

  // Heuristic picks (used for the in-row badges next to the price).
  const cheapestPick = pickCheapest(busOptions, flightOptions, mode);
  const fastestPick = pickFastest(busOptions, flightOptions, mode);

  const initial = cheapestPick || (busOptions[0] && flightOptions[0]
    ? { busId: busOptions[0].id, flightId: flightOptions[0].id }
    : { busId: null, flightId: null });
  const [sel, setSel] = useState(initial);
  const [showMap, setShowMap] = useState(false);
  // 0=collapsed (5 options), 1=mid (+6 more), 2=all
  const [busStage, setBusStage] = useState(0);
  const [flightStage, setFlightStage] = useState(0);
  // Card itself starts collapsed — user expands it from the header click.
  // The top card in a section gets defaultExpanded=true so users don't open an
  // entirely shut accordion on first paint.
  const [expanded, setExpanded] = useState(defaultExpanded);
  // Smart picks (AI top-3 button) — null = not requested, [] = no result
  const [smart, setSmart] = useState(null);
  const [smartLoading, setSmartLoading] = useState(false);

  // Reset selection when a new search lands (hubData identity changes).
  useEffect(() => {
    const fresh = pickCheapest(busOptions, flightOptions, mode);
    if (fresh) {
      setSel({ busId: fresh.busId, flightId: fresh.flightId });
    } else if (busOptions[0] && flightOptions[0]) {
      setSel({ busId: busOptions[0].id, flightId: flightOptions[0].id });
    }
    setBusStage(0);
    setFlightStage(0);
    setExpanded(defaultExpanded);
    setSmart(null);
  }, [hubData]);

  const selBus = busOptions.find((b) => b.id === sel.busId) || null;
  const selFlight = flightOptions.find((f) => f.id === sel.flightId) || null;
  const conn = (selBus && selFlight) ? calcConnection(selBus, selFlight, mode) : null;
  const connStyle = conn ? connStyleFor(conn.level, t) : null;
  const total = (selBus?.price ?? 0) + (selFlight?.price ?? 0);
  const overallMin = totalTripMin(selBus, selFlight, mode);

  // Toggle picks: clicking a row that is already selected clears it. This unlocks
  // any rows that were disabled because they could not connect to that pick —
  // exactly the "tıklanan elemana bir daha tıkladığında, tıklanma kalkıcak ve
  // tıklanamayan elemanlar tıklanabilir olacak" behavior.
  const onPickBus = (id) => { setSel((s) => ({ ...s, busId: s.busId === id ? null : id })); };
  const onPickFlight = (id) => { setSel((s) => ({ ...s, flightId: s.flightId === id ? null : id })); };

  // Per-row badge map (which option belongs to a heuristic pick)
  const badgesFor = (kind, id) => ({
    cheap: cheapestPick && cheapestPick[kind === 'bus' ? 'busId' : 'flightId'] === id,
    fast: fastestPick && fastestPick[kind === 'bus' ? 'busId' : 'flightId'] === id,
  });

  // Wait info for an option in the SECOND leg column, paired with the current
  // first-leg pick. Returns null when the first leg isn't picked yet (so we
  // skip rendering the "X bekleme" line until both sides exist).
  const waitInfoFor = (kind, opt) => {
    const firstSel = mode === 'bus_plus_flight' ? selBus : selFlight;
    if (!firstSel) return null;
    const isSecondLeg = mode === 'bus_plus_flight' ? kind === 'flight' : kind === 'bus';
    if (!isSecondLeg) return null;
    const [bus, flight] = mode === 'bus_plus_flight' ? [firstSel, opt] : [opt, firstSel];
    const c = calcConnection(bus, flight, mode);
    if (c.minutes == null) return null;
    return { minutes: c.minutes, color: connStyleFor(c.level, t).color };
  };

  const noPairing = hubData.minTotal == null;

  const mapRoute = (selBus && selFlight) ? { segments: buildHubMapSegs(hubData, selBus, selFlight) } : null;

  const busColTitle = (
    <div className="hub-col-title">
      <span className="hub-col-icon">🚌</span>{t.chooseBusLabel}
    </div>);
  const flightColTitle = (
    <div className="hub-col-title">
      <span className="hub-col-icon">✈</span>{t.chooseFlightLabel}
    </div>);

  // Sort chronologically. Stage-based collapse: 0 → 6, 1 → 6+6, 2 → all.
  const COLLAPSE_BASE = 6;
  const COLLAPSE_STEP = 6;
  const sortedBuses = sortByDep(busOptions);
  const sortedFlights = sortByPrice(flightOptions);

  const stageLimit = (stage, total) => {
    if (stage >= 2) return total;
    if (stage === 1) return Math.min(total, COLLAPSE_BASE + COLLAPSE_STEP);
    return Math.min(total, COLLAPSE_BASE);
  };
  const busLimit = stageLimit(busStage, sortedBuses.length);
  const flightLimit = stageLimit(flightStage, sortedFlights.length);
  const visibleBuses = visibleOptions(sortedBuses, sel.busId, busLimit);
  const visibleFlights = visibleOptions(sortedFlights, sel.flightId, flightLimit);

  // Disable rule: a bus that can't connect to the currently-selected flight (and vice versa)
  // becomes unclickable. Mirrors the 2h rule used by min_total_price.
  const isBusDisabled = (b) => {
    if (!selFlight) return false;
    if (b.id === sel.busId) return false;
    return calcConnection(b, selFlight, mode).level === 'red';
  };
  const isFlightDisabled = (f) => {
    if (!selBus) return false;
    if (f.id === sel.flightId) return false;
    return calcConnection(selBus, f, mode).level === 'red';
  };

  const stepBusStage = () => setBusStage((s) => Math.min(2, s + 1));
  const stepFlightStage = () => setFlightStage((s) => Math.min(2, s + 1));

  const toggleLabel = (stage, total) => {
    if (stage >= 2) return t.showFewer;
    const nextLimit = stageLimit(stage + 1, total);
    return stage + 1 >= 2 || nextLimit >= total
      ? `${t.showAllOptions} (${total})`
      : t.showMoreOptions;
  };

  const busCol = (
    <div className="hub-col">
      {busColTitle}
      {visibleBuses.map((b) => (
        <HubOptionRow key={b.id} kind="bus" opt={b}
          selected={b.id === sel.busId}
          disabled={isBusDisabled(b)}
          onSelect={() => onPickBus(b.id)}
          badges={badgesFor('bus', b.id)}
          waitInfo={waitInfoFor('bus', b)}
          currency={currency} lang={lang} />
      ))}
      {sortedBuses.length > COLLAPSE_BASE && (
        <button
          className={`hub-col-toggle${busStage >= 2 ? ' expanded' : ''}`}
          onClick={() => (busStage >= 2 ? setBusStage(0) : stepBusStage())}
          type="button">
          <span>{toggleLabel(busStage, sortedBuses.length)}</span>
          <span className="arrow">▾</span>
        </button>
      )}
    </div>);
  const flightCol = (
    <div className="hub-col">
      {flightColTitle}
      {visibleFlights.map((f) => (
        <HubOptionRow key={f.id} kind="flight" opt={f}
          selected={f.id === sel.flightId}
          disabled={isFlightDisabled(f)}
          onSelect={() => onPickFlight(f.id)}
          badges={badgesFor('flight', f.id)}
          waitInfo={waitInfoFor('flight', f)}
          currency={currency} lang={lang} />
      ))}
      {sortedFlights.length > COLLAPSE_BASE && (
        <button
          className={`hub-col-toggle${flightStage >= 2 ? ' expanded' : ''}`}
          onClick={() => (flightStage >= 2 ? setFlightStage(0) : stepFlightStage())}
          type="button">
          <span>{toggleLabel(flightStage, sortedFlights.length)}</span>
          <span className="arrow">▾</span>
        </button>
      )}
    </div>);

  // ── AI smart picks (global Top-3 across all valid combos) ──────────────────
  // Walk every (bus,flight) pair, drop ones that don't satisfy the 2h rule, pass
  // a compact summary to the model and ask for a 3-element JSON ranking. We
  // only pass the prompt+combos and let the model attach a label and reason.
  async function getSmartPicks() {
    setSmartLoading(true);
    try {
      const combos = [];
      for (const f of flightOptions) {
        for (const b of busOptions) {
          const c = calcConnection(b, f, mode);
          if (c.minutes == null || c.minutes < PICK_MIN_CONNECTION) continue;
          const overall = totalTripMin(b, f, mode);
          combos.push({
            flight: f, bus: b,
            wait: c.minutes,
            overall,
            price: (b.price ?? 0) + (f.price ?? 0)
          });
        }
      }
      if (combos.length === 0) {
        setSmart([{ label: '⚠️', reason: t.aiPickEmpty, combo: null }]);
        setSmartLoading(false);
        return;
      }
      const summary = combos.map((c) => ({
        f: `${c.flight.airline || ''} ${c.flight.flightNo || ''} ${c.flight.dep}-${c.flight.arr} €${c.flight.price}`.trim(),
        b: `${c.bus.company || 'Bus'} ${c.bus.dep}-${c.bus.arr} €${c.bus.price}`,
        wait: fmtConnMinutes(c.wait), overall: fmtConnMinutes(c.overall), price: `€${c.price}`
      }));
      const prompt = `Sen seyahat asistanısın. Aşağıdaki ${mode === 'flight_plus_bus' ? 'uçak+otobüs' : 'otobüs+uçak'} kombinasyonlarından en iyi 3'ünü seç. Her biri için: bir kategori etiketi (örn: "🌅 Sabah erken", "💰 En ucuz", "⚡ En hızlı", "🌙 Gece yolculuğu") ve 1 cümlelik tavsiye yaz.
Kombinasyonlar:
${summary.map((s, i) => `${i + 1}. ${mode === 'flight_plus_bus' ? `Uçak ${s.f}, sonra Otobüs ${s.b}` : `Otobüs ${s.b}, sonra Uçak ${s.f}`} | bekleme: ${s.wait} | toplam yolculuk: ${s.overall} | toplam: ${s.price}`).join('\n')}

Sadece JSON döndür: [{"index": 1-based, "label": "🌅 Sabah erken", "reason": "..."}]
3 öğe içersin.`;
      let txt = '';
      if (window.claude && typeof window.claude.complete === 'function') {
        txt = await window.claude.complete(prompt);
      } else {
        // Fallback: pick three deterministic combos so the panel is still useful
        // when the page is opened outside the Claude harness.
        const cheap = [...combos].sort((a, b) => a.price - b.price)[0];
        const fast = [...combos].sort((a, b) => a.overall - b.overall)[0];
        const balanced = [...combos].sort((a, b) => (a.price * 2 + a.overall) - (b.price * 2 + b.overall))[0];
        const fakePicks = [];
        const seen = new Set();
        for (const [c, label, reason] of [
          [cheap, '💰 En ucuz', 'Toplam fiyatta en avantajlı seçenek.'],
          [fast, '⚡ En hızlı', 'Toplam yolculuk süresi en kısa.'],
          [balanced, '🎯 Dengeli', 'Fiyat ve süre dengesinde en iyi.']
        ]) {
          if (!c) continue;
          const key = `${c.flight.id}|${c.bus.id}`;
          if (seen.has(key)) continue;
          seen.add(key);
          fakePicks.push({ index: combos.indexOf(c) + 1, label, reason });
        }
        txt = JSON.stringify(fakePicks);
      }
      const jsonMatch = txt.match(/\[[\s\S]*\]/);
      if (jsonMatch) {
        const picks = JSON.parse(jsonMatch[0]);
        setSmart(picks.map((p) => ({ ...p, combo: combos[p.index - 1] })).filter((p) => p.combo));
      } else {
        setSmart([{ label: '⚠️', reason: t.aiError, combo: null }]);
      }
    } catch (e) {
      console.error(e);
      setSmart([{ label: '⚠️', reason: t.aiError, combo: null }]);
    }
    setSmartLoading(false);
  }

  const applySmartCombo = (c) => {
    if (!c) return;
    setSel({ busId: c.bus.id, flightId: c.flight.id });
  };

  // ── Booking links ──────────────────────────────────────────────────────────
  // Bus URL stays as a flat https://www.omio.com — wire the proper Omio search
  // shape later when we know which fields it accepts.
  // Flight leg endpoints depend on the trip shape: in flight_plus_bus the flight
  // goes origin → hub; in bus_plus_flight it goes hub → destination. Prefer the
  // flight option's own fromIata/toIata when present, fall back to hubData.
  const derivedFlightFrom = mode === 'flight_plus_bus' ? hubData.depIata : hub.iata;
  const derivedFlightTo   = mode === 'flight_plus_bus' ? hub.iata        : hubData.arrIata;
  const skyscannerUrl = buildSkyscannerUrl({
    fromIata: selFlight?.fromIata || derivedFlightFrom,
    toIata:   selFlight?.toIata   || derivedFlightTo,
    date,
    depTime:     selFlight?.dep,
    stops:       selFlight?.stops,
    durationMin: selFlight?.durationMin,
  });
  const omioUrl = 'https://www.omio.com/';

  return (
    <div className={`hub-card${noPairing ? ' no-pairing' : ''}${expanded ? ' expanded' : ' collapsed'}`}>
      <div
        className="hub-card-head"
        role="button"
        tabIndex={0}
        onClick={() => setExpanded((v) => !v)}
        onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); setExpanded((v) => !v); } }}
      >
        <div className="hub-iata-badge">{hub.iata}</div>
        <div className="hub-head-info">
          <div className="hub-head-title">{hub.city} {t.hubViaTitle}</div>
          <div className="hub-head-sub">
            {hub.distanceKm != null ? `${Math.round(hub.distanceKm)} km ${t.hubDistance}` : ''}
            {' · '}{busOptions.length} {t.hubBusOptions} · {flightOptions.length} {t.hubFlightOptions}
          </div>
        </div>
        <div className="hub-head-min">
          <div className="hub-head-min-label">{t.hubMinFromLabel}</div>
          <div className="hub-head-min-price">{hubData.minTotal != null ? fmt(hubData.minTotal) : '—'}</div>
          {noPairing && <div className="hub-head-min-warn">⚠ &lt;2h</div>}
        </div>
        <div className={`hub-card-caret${expanded ? ' open' : ''}`} aria-hidden="true">▾</div>
      </div>

      {noPairing && expanded && <div className="hub-no-pairing-banner">⚠ {t.noValidPairing}</div>}

      {expanded && <>
      {/* Global AI Top-3 picker — replaces the old En ucuz/En hızlı/Sabah erken chips. */}
      <div className="hub-smart-bar">
        {!smart && !smartLoading && (
          <button className="hub-smart-btn" onClick={getSmartPicks}>
            {t.aiTopBtn} <small>{t.aiTopBtnSmall}</small>
          </button>
        )}
        {smartLoading && <div className="hub-smart-loading">{t.aiTopLoading}</div>}
        {smart && (
          <div className="hub-smart-row">
            <div className="hub-smart-title">{t.aiSmartTitle}</div>
            <div className="hub-smart-cards">
              {smart.map((s, i) => (
                <button key={i} className="hub-smart-card"
                  onClick={() => applySmartCombo(s.combo)}
                  disabled={!s.combo}>
                  <div className="hub-smart-label">{s.label}</div>
                  <div className="hub-smart-reason">{s.reason}</div>
                  {s.combo && (
                    <div className="hub-smart-meta">{fmt(s.combo.price)} · {fmtConnMinutes(s.combo.overall)}</div>
                  )}
                </button>
              ))}
            </div>
            <button className="hub-smart-clear" title={t.aiClearTitle} onClick={() => setSmart(null)}>✕</button>
          </div>
        )}
      </div>

      <div className="hub-grid">
        {mode === 'bus_plus_flight' ? <>{busCol}{flightCol}</> : <>{flightCol}{busCol}</>}
      </div>

      {/* SEÇTİĞİN KOMBİNASYON: 3-card timeline (leg1 / wait / leg2) + totals + buy buttons. */}
      <div className="hub-summary">
        <div className="hub-summary-title">{t.summaryHeader}</div>
        <div className="hub-summary-timeline">
          {(() => {
            const flightCarrier = `${selFlight?.airline || ''}${selFlight?.flightNo ? ' ' + selFlight.flightNo : ''}`.trim();
            const busCarrier = selBus?.company || (lang === 'tr' ? 'Otobüs' : 'Bus');
            const flightCard = (
              <div className="hubs-leg">
                <div className="hubs-leg-label">✈ {t.flightLegLabel}</div>
                <div className="hubs-leg-times">
                  {selFlight ? `${selFlight.dep} → ${selFlight.arr}` : '— → —'}
                </div>
                <div className="hubs-leg-meta">
                  {selFlight ? `${flightCarrier} · ${fmt(selFlight.price)}` : '—'}
                </div>
              </div>);
            const busCard = (
              <div className="hubs-leg">
                <div className="hubs-leg-label">🚌 {t.busLegLabel}</div>
                <div className="hubs-leg-times">
                  {selBus ? `${selBus.dep} → ${selBus.arr}${selBus.nextDay ? ' (+1)' : ''}` : '— → —'}
                </div>
                <div className="hubs-leg-meta">
                  {selBus ? `${busCarrier} · ${fmt(selBus.price)}` : '—'}
                </div>
              </div>);
            const waitCard = (
              <div className="hubs-wait" style={connStyle ? {
                background: connStyle.bg, color: connStyle.color, borderColor: connStyle.color
              } : {
                background: 'var(--bg)', color: 'var(--lt)', borderColor: 'var(--brd)'
              }}>
                <div className="hubs-wait-icon">⏱</div>
                <div>
                  <div className="hubs-wait-time">
                    {(conn && conn.minutes != null) ? fmtConnMinutes(conn.minutes) : t.waitMissing}
                  </div>
                  <div className="hubs-wait-label">
                    {connStyle ? <><strong>{connStyle.label}</strong> · {hub.iata} {t.waitWord}</> : `${hub.iata} ${t.waitWord}`}
                  </div>
                  {connStyle && (
                    <div className="hubs-wait-desc">
                      {connStyle.desc} · {mode === 'flight_plus_bus' ? t.transferDescF2B : t.transferDescB2F}
                    </div>
                  )}
                </div>
              </div>);
            return mode === 'bus_plus_flight'
              ? <>{busCard}{waitCard}{flightCard}</>
              : <>{flightCard}{waitCard}{busCard}</>;
          })()}
        </div>
        <div className="hub-summary-bottom">
          <div className="hub-summary-stats">
            <div>
              <small>{t.totalTripLabel}</small>
              <span>{overallMin != null ? fmtConnMinutes(overallMin) : '—'}</span>
            </div>
            <div>
              <small>{t.totalPriceLabel}</small>
              <span className="price">{(selBus && selFlight) ? fmt(total) : '—'}</span>
            </div>
          </div>
          <div className="hub-summary-actions">
            <button className="hub-buy-btn map" onClick={() => setShowMap((p) => !p)}>
              🗺 {showMap ? t.mapHideBtn : t.mapShowBtn}
            </button>
            <a className="hub-buy-btn flight" href={skyscannerUrl} target="_blank" rel="noopener noreferrer">
              ✈ {t.bookFlightBtn} ↗
            </a>
            <a className="hub-buy-btn bus" href={omioUrl} target="_blank" rel="noopener noreferrer">
              🚌 {t.bookBusBtn} ↗
            </a>
          </div>
        </div>
        {showMap && mapRoute && (
          <div style={{ marginTop: 12 }}>
            <InlineMap route={mapRoute} onClose={() => setShowMap(false)} lang={lang}
              hubIata={hub.iata}
              hubWait={conn && conn.minutes != null ? { minutes: conn.minutes, color: connStyle?.color, bg: connStyle?.bg, label: t.waitWord } : null} />
          </div>
        )}
      </div>
      </>}
    </div>);
}

// Build a Journey + DetailSegs + Map shape from the user's current pick.

// ── Section content ───────────────────────────────────────────────────────────
function SectionContent({ secIdx, data, currency, lang, date }) {
  const t = T[lang];
  if (!data || data.length === 0) return <div className="no-result"><div className="no-icon">🔍</div>{t.noResult}</div>;
  if (secIdx === 0 || secIdx === 1) {
    return <div className="cards-list">{data.map((d, i) =>
      d.stops > 0 ?
      <TransferCard key={i} d={d} currency={currency} lang={lang} date={date} /> :
      <FlightCard key={i} d={d} currency={currency} lang={lang} date={date} />
      )}</div>;
  }
  if (secIdx === 2 || secIdx === 3) {
    return <div className="cards-list">{data.map((h, i) =>
      <HubMasterCard key={`${h.hub?.iata || i}-${i}`} hubData={h} currency={currency} lang={lang} defaultExpanded={i === 0} date={date} />
    )}</div>;
  }
  if (secIdx === 4) return <div className="cards-list">{data.map((d, i) => <GroundCard key={i} d={d} currency={currency} lang={lang} />)}</div>;
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [lang, setLang] = useState('tr');
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [showTweaks, setShowTweaks] = useState(false);
  const [from, setFrom] = useState('');
  const [to, setTo] = useState('');
  const [fromAp, setFromAp] = useState(null);
  const [toAp, setToAp] = useState(null);
  const [date, setDate] = useState('2026-05-05');
  const [results, setResults] = useState(null);
  const [loading, setLoading] = useState(false);
  const [loadingCards, setLoadingCards] = useState({ flights: false, flightBus: false, busFlight: false });
  const [activeSec, setActiveSec] = useState(0);
  const [filter, setFilter] = useState(FILTER_DEFAULTS);
  const [filterOpen, setFilterOpen] = useState(false);
  const [airports, setAirports] = useState([]);
  const t = T[lang];
  const resultsRef = useRef(null);

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', tweaks.theme || 'light');
  }, [tweaks.theme]);

  // Fetch the IT/DE airport list once for autocomplete suggestions.
  useEffect(() => {
    fetch('/api/airports')
      .then((r) => r.json())
      .then((data) => setAirports(Array.isArray(data?.airports) ? data.airports : []))
      .catch((err) => console.error('/api/airports failed:', err));
  }, []);

  function swap() {setFrom(to);setTo(from);setFromAp(toAp);setToAp(fromAp);}

  function mergeAirports(data) {
    if (!data || !data.airports) return;
    for (const [iata, info] of Object.entries(data.airports)) {
      if (info && typeof info.lat === 'number' && typeof info.lon === 'number') {
        LATLNG[iata] = [info.lat, info.lon];
      }
      if (info && info.city && !CITY_NAMES[iata]) {
        CITY_NAMES[iata] = info.city;
      }
    }
  }

  async function fetchPart(url, body) {
    const resp = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({ error: 'HTTP ' + resp.status }));
      throw new Error(err.error || 'HTTP ' + resp.status);
    }
    return resp.json();
  }

  async function doSearch() {
    if (!from || !to) return;
    const body = { from_city: from, to_city: to, date, from_iata: fromAp, to_iata: toAp };

    setLoading(true);
    setLoadingCards({ flights: true, flightBus: true, busFlight: true });
    setFilter(FILTER_DEFAULTS);
    setFilterOpen(false);
    setResults({
      bestFlights: [],
      cheapFlights: [],
      flightPlusBus: [],
      busPlusFlight: [],
      busOrTrain: MOCK.busOrTrain,
    });
    setActiveSec(0);

    // Smooth-scroll the results area into view so the loading state is the
    // first thing the user sees instead of staring at the dominant search hero.
    // Use requestAnimationFrame so the layout has settled after setResults({}).
    requestAnimationFrame(() => {
      const el = resultsRef.current;
      if (!el) return;
      const top = el.getBoundingClientRect().top + window.scrollY - 24;
      window.scrollTo({ top, behavior: 'smooth' });
    });

    const flightsTask = fetchPart('/api/flights', body)
      .then((data) => {
        mergeAirports(data);
        setResults((prev) => ({
          ...(prev || {}),
          bestFlights: data.bestFlights ?? [],
          cheapFlights: data.cheapFlights ?? [],
          resolved: data.resolved ?? null,
        }));
      })
      .catch((err) => console.error('/api/flights failed:', err))
      .finally(() => setLoadingCards((prev) => ({ ...prev, flights: false })));

    const flightBusTask = fetchPart('/api/flight-plus-bus', body)
      .then((data) => {
        mergeAirports(data);
        setResults((prev) => ({
          ...(prev || {}),
          flightPlusBus: data.flightPlusBus ?? [],
        }));
      })
      .catch((err) => console.error('/api/flight-plus-bus failed:', err))
      .finally(() => setLoadingCards((prev) => ({ ...prev, flightBus: false })));

    const busFlightTask = fetchPart('/api/bus-plus-flight', body)
      .then((data) => {
        mergeAirports(data);
        setResults((prev) => ({
          ...(prev || {}),
          busPlusFlight: data.busPlusFlight ?? [],
        }));
      })
      .catch((err) => console.error('/api/bus-plus-flight failed:', err))
      .finally(() => setLoadingCards((prev) => ({ ...prev, busFlight: false })));

    await Promise.all([flightsTask, flightBusTask, busFlightTask]);
    setLoading(false);
  }

  function updateTweak(key, val) {
    setTweaks((prev) => ({ ...prev, [key]: val }));
  }

  const cur = tweaks.currency || 'EUR';
  const fmt = (n) => cur === "USD" ? `$${n}` : `€${n}`;

  const minPriceOf = (arr, key) => {
    if (!arr || !arr.length) return null;
    const prices = arr.map((d) => d[key]).filter((p) => typeof p === 'number' && isFinite(p));
    return prices.length ? Math.min(...prices) : null;
  };

  const { filtered: filteredResults, removed } = applyFilters(results, filter);
  const fActive = isFilterActive(filter);
  const fCount = activeFilterCount(filter);

  const CATS = [
  { icon: '✈️', label: t.bestFlight, sub: t.bestFlightSub, color: '#2563EB', data: filteredResults?.bestFlights, minPrice: minPriceOf(filteredResults?.bestFlights, 'price'), loading: loadingCards.flights, removed: removed[0] },
  { icon: '💶', label: t.cheapFlight, sub: t.cheapFlightSub, color: '#16A34A', data: filteredResults?.cheapFlights, minPrice: minPriceOf(filteredResults?.cheapFlights, 'price'), loading: loadingCards.flights, removed: removed[1] },
  { icon: '✈🚌', label: t.flightBus, sub: t.flightBusSub, color: '#7C3AED', data: filteredResults?.flightPlusBus, minPrice: minPriceOf(filteredResults?.flightPlusBus, 'minTotal'), loading: loadingCards.flightBus, removed: removed[2] },
  { icon: '🚌✈', label: t.busFlight, sub: t.busFlightSub, color: '#0891B2', data: filteredResults?.busPlusFlight, minPrice: minPriceOf(filteredResults?.busPlusFlight, 'minTotal'), loading: loadingCards.busFlight, removed: removed[3] },
  { icon: '🚌', label: t.busOnly, sub: t.busOnlySub, color: '#475569', data: filteredResults?.busOrTrain, minPrice: minPriceOf(filteredResults?.busOrTrain, 'price'), loading: false, removed: removed[4] }];

  const activeCat = CATS[activeSec];
  const sectionEmpty = activeCat && !activeCat.loading && (!activeCat.data || activeCat.data.length === 0);


  return (
    <>
      <header className="hdr" style={{ fontFamily: "\"Space Grotesk\"" }}>
        <div className="logo">
          <div className="logo-icon">
            <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M7 23 Q 12 14 16 14 Q 20 14 25 9" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeDasharray="2.5 2.5" fill="none" />
              <circle cx="7" cy="23" r="3" fill="#fff" />
              <circle cx="16" cy="14" r="2.2" fill="#fff" fillOpacity="0.55" />
              <circle cx="25" cy="9" r="3" fill="#fff" />
            </svg>
          </div>
          Multi Route
        </div>
        <div className="hdr-right">
          <button className="theme-btn" onClick={() => setShowTweaks((p) => !p)} aria-label={t.tweaks}>⚙</button>
          <button className="theme-btn" onClick={() => updateTweak('theme', tweaks.theme === 'dark' ? 'light' : 'dark')}>
            {tweaks.theme === 'dark' ? '☀ Light' : '🌙 Dark'}
          </button>
          <div className="lang-toggle">
            <button className={`lang-btn${lang === 'tr' ? ' active' : ''}`} onClick={() => setLang('tr')}>TR</button>
            <button className={`lang-btn${lang === 'en' ? ' active' : ''}`} onClick={() => setLang('en')}>EN</button>
          </div>
        </div>
      </header>

      <section className="hero">
        <div style={{ maxWidth: 900 }}>
          <div className="hero-title">Multi Route</div>
          <div className="hero-sub">{t.tagline}</div>
          <div className="search-box">
            <CityInput label={t.from} value={from} onChange={setFrom} onAirportSelect={setFromAp} selectedAirport={fromAp} lang={lang} airports={airports} />
            <button className="swap-btn" onClick={swap}>⇄</button>
            <CityInput label={t.to} value={to} onChange={setTo} onAirportSelect={setToAp} selectedAirport={toAp} lang={lang} airports={airports} />
            <div className="sf-field sf-date">
              <div className="sf-label">{t.date}</div>
              <div className="sf-input-wrap">
                <input type="date" className="sf-input" value={date} onChange={(e) => setDate(e.target.value)} />
              </div>
            </div>
            <button className="search-btn" onClick={doSearch} disabled={loading}>
              {loading ? t.searching : `🔍 ${t.search}`}
            </button>
          </div>
          {!results && !loading &&
          <div style={{ marginTop: 14, color: 'rgba(255,255,255,.6)', fontSize: 13, cursor: 'pointer', userSelect: 'none' }}
          onClick={() => {setFrom('Venice');setTo('Nürnberg');setTimeout(doSearch, 80);}}>
              💡 {t.trySearch}
            </div>
          }
        </div>
      </section>

      <main className="results" ref={resultsRef}>
        {results &&
        <>
            {loading && <div className="loading-bar" />}
            <div className="res-info">
              <b>{results.resolved ? `${results.resolved.fromCity} (${results.resolved.from})` : from}</b>
              {' → '}
              <b>{results.resolved ? `${results.resolved.toCity} (${results.resolved.to})` : to}</b>
              · {date}
            </div>
            {/* FILTER BAR */}
            <div className="filter-bar">
              <button className={`filter-toggle${filterOpen ? ' open' : ''}`} onClick={() => setFilterOpen((p) => !p)}>
                ⚙ {t.advFilter}
                {fCount > 0 && <span className="filter-toggle-badge">{fCount}</span>}
                <span style={{ fontSize: 11, opacity: .6 }}>{filterOpen ? '▴' : '▾'}</span>
              </button>
              <ActiveFilterChips filter={filter} setFilter={setFilter} lang={lang} />
            </div>
            {filterOpen && <FilterPanel filter={filter} setFilter={setFilter} lang={lang} />}

            {/* CATEGORY BAR */}
            <div className="cat-bar">
              {CATS.map((c, i) =>
            <div key={i} className={`cat-pill${activeSec === i ? ' active' : ''}`} onClick={() => setActiveSec(i)}>
                  <span className="cat-pill-icon">{c.icon}</span>
                  <span className="cat-pill-label">{c.label}</span>
                  <span className="cat-pill-price">
                    {c.loading ? <span className="cat-pill-spinner" /> : (c.minPrice != null ? fmt(c.minPrice) : '—')}
                  </span>
                  <span className="cat-pill-sub">{c.sub}</span>
                  {fActive && c.removed > 0 && <span className="cat-pill-filtered">-{c.removed}</span>}
                  {activeSec === i && <div className="cat-active-bar" />}
                </div>
            )}
            </div>
            {fActive && sectionEmpty && (
              <div className="filter-banner">
                <span className="filter-banner-icon">🚫</span>
                <span>{t.bannerEmpty}</span>
                <button className="filter-banner-action" onClick={() => setFilter(FILTER_DEFAULTS)}>↺ {t.fReset}</button>
              </div>
            )}
            {fActive && !sectionEmpty && activeCat.removed > 0 && (
              <div className="filter-banner info">
                <span className="filter-banner-icon">ℹ</span>
                <span>{activeCat.removed} {t.bannerSomeFiltered}</span>
              </div>
            )}
            {/* ACTIVE SECTION */}
            <div className="sec-body">
              {activeCat.loading && (!activeCat.data || activeCat.data.length === 0) ?
                <div className="sk" style={{ height: 200, borderRadius: 12 }} /> :
                <SectionContent secIdx={activeSec} data={activeCat.data} currency={cur} lang={lang} date={date} />
              }
            </div>
          </>
        }

        {!results &&
        <div className="empty-state">
            <div className="empty-icon">✈</div>
            <div className="empty-title">{lang === 'tr' ? 'Seyahatini ara' : 'Search your journey'}</div>
            <div style={{ color: 'var(--lt)', fontSize: 14, marginTop: 6 }}>{lang === 'tr' ? 'Formu doldur ve Ara\'ya bas' : 'Fill in the form above and hit Search'}</div>
          </div>
        }
      </main>

      {showTweaks &&
      <div className="tweaks-panel">
          <div className="tweaks-title">⚙ {t.tweaks}</div>
          <div className="tw-group">
            <div className="tw-label">{t.currency}</div>
            <div className="tw-opts">
              {['EUR', 'USD', 'GBP'].map((c) =>
            <div key={c} className={`tw-opt${cur === c ? ' active' : ''}`} onClick={() => updateTweak('currency', c)}>{c}</div>
            )}
            </div>
          </div>
          <div className="tw-group">
            <div className="tw-label">Tema</div>
            <div className="tw-opts">
              {[['light', '☀ Light'], ['dark', '🌙 Dark']].map(([v, l]) =>
            <div key={v} className={`tw-opt${tweaks.theme === v ? ' active' : ''}`} onClick={() => updateTweak('theme', v)}>{l}</div>
            )}
            </div>
          </div>
        </div>
      }
    </>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
