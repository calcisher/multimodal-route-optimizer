<link rel="stylesheet" href="css/main.css"/>
<style>
  /* Extra styles for hub-wait map tooltip */
  .map-hub-hit { background: transparent !important; border: none !important; }
  .leaflet-tooltip.map-hub-wait-tip {
    background: rgba(255,255,255,.97);
    border: 1.5px solid var(--brd);
    border-radius: 8px;
    padding: 5px 10px;
    font-family: var(--f);
    font-size: 12px;
    font-weight: 700;
    box-shadow: var(--sh);
    pointer-events: none;
  }
  .leaflet-tooltip.map-hub-wait-tip:before { display: none; }
</style>

<div id="root"></div>
